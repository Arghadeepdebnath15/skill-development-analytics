<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management | Sharda University</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="student-profile.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Unified Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="https://shardauniversity.com/img/logo-mobile.png" style="height: 40px; filter: brightness(0) invert(1); margin-bottom: 10px; display: block;">
                Sharda Skills
            </div>
            <nav>
                <a href="/" class="sidebar-link"><span>🏠</span> Home Portal</a>
                <a href="/admin/index.html" class="sidebar-link"><span>📈</span> Analytics Hub</a>
                <a href="/admin/students.html" class="sidebar-link active"><span>👥</span> Student Directory</a>
                <a href="/student/index.html" class="sidebar-link"><span>👤</span> Personal Records</a>
                <a href="#" class="sidebar-link"><span>📋</span> Admissions</a>
            </nav>
        </aside>

        <!-- Main Workspace -->
        <div class="main-container">
            <header class="top-header">
                <div class="search-bar">
                    <span>🔍</span>
                    <input type="text" id="globalSearch" placeholder="Enter name...">
                </div>
                <div style="display: flex; gap: 2rem;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="font-size: 0.7rem; font-weight: 800; color: var(--text-muted);">SCHOOL</span>
                        <select id="deptFilter" style="background: #222e50; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 700; font-size: 0.75rem;"></select>
                    </div>
                </div>
            </header>

            <main class="main-content">
                <div class="flex-between mb-1">
                    <h1 style="font-size: 1.8rem; font-weight: 900; color: var(--primary);">Student Audit</h1>
                    <div style="text-align: right;">
                        <div style="font-size: 0.8rem; font-weight: 800; color: var(--text-muted);">B.TECH 6TH SEMESTER</div>
                        <div style="font-size: 0.6rem; font-weight: 700; color: var(--text-muted);">SKILLS ASSESSMENT & AUDIT</div>
                    </div>
                </div>

                <!-- Audit Summary Bar -->
                <div id="auditSummary" style="background: #151e3d; padding: 1.5rem 2rem; border-radius: 12px; margin-bottom: 2rem; display: flex; gap: 4rem; align-items: center; border: 1px solid rgba(255,255,255,0.05);">
                    <div style="color: #448aff; font-weight: 800; font-size: 0.85rem;">Total Students: <span id="studentCount" style="color: white;">0</span></div>
                    <div style="color: #448aff; font-weight: 800; font-size: 0.85rem;">Avg GD: <span id="avgGd" style="color: #ffcf2a;">0.0</span></div>
                    <div style="color: #448aff; font-weight: 800; font-size: 0.85rem;">Avg MIP: <span id="avgMip" style="color: #ffcf2a;">0.0</span></div>
                    <div style="color: #448aff; font-weight: 800; font-size: 0.85rem;">Avg LSRW: <span id="avgLsrw" style="color: #4caf50;">0.0</span></div>
                </div>

                <div class="table-container card p-0" style="background: transparent; border: none; box-shadow: none;">
                    <table class="audit-table">
                        <thead style="background: #1a237e10;">
                            <tr>
                                <th>ID</th>
                                <th>NAME</th>
                                <th>SCHOOL</th>
                                <th>SECTION</th>
                                <th>RESUME</th>
                                <th>GD</th>
                                <th>MIP</th>
                                <th>WT1</th>
                                <th>WT2</th>
                                <th>WT3</th>
                                <th>VA</th>
                                <th>QA</th>
                                <th>LR</th>
                                <th>ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Student Profile Modal (Legacy but kept for backup if needed, though we redirect now) -->
    <div id="profileModal" class="modal">
        <div class="modal-content profile-modal animate-fade">
            <button class="close-btn" onclick="document.getElementById('profileModal').style.display='none'">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script type="module" src="students.js"></script>
</body>
</html>
